name: Test

on:
  pull_request_target:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install candidate dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Fetch test suite
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ secrets.TEST_REPO_TOKEN }}@github.com/tmublueprint/bp-recruitment-test.git /tmp/tests
          cp /tmp/tests/test.py .
          rm -rf /tmp/tests
        env:
          TEST_REPO_TOKEN: ${{ secrets.TEST_REPO_TOKEN }}

      - name: Install test dependencies
        run: pip install requests

      - name: Start server
        run: python app.py &
        env:
          PORT: 3000

      - name: Wait for server
        run: |
          for i in $(seq 1 10); do
            curl -s http://localhost:3000/orders > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run tests
        run: python test.py
